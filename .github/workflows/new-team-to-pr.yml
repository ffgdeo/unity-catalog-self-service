name: New team request → PR

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  open-pr:
    if: contains(github.event.issue.labels.*.name, 'new-team')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse and validate issue body
        id: parse
        env:
          BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          extract() {
            python3 -c "
          import os, re, sys
          body = os.environ['BODY']
          label = sys.argv[1]
          m = re.search(r'^###\s+' + re.escape(label) + r'\s*\n+(.+?)(?=\n###|\Z)', body, re.M | re.S)
          if not m:
              print('', end='')
              sys.exit(0)
          print(m.group(1).strip())
          " "$1"
          }

          team_name=$(extract "Team name")
          workspace_id=$(extract "Workspace ID")
          sandbox_catalog=$(extract "Sandbox catalog")
          cost_center=$(extract "Cost center")
          data_domain=$(extract "Data domain")

          errors=""
          if [ -z "$team_name" ]; then
            errors+="- Team name is required."$'\n'
          elif ! [[ "$team_name" =~ ^[a-z][a-z0-9-]*$ ]]; then
            errors+="- Team name \`$team_name\` is invalid. Must be lowercase letters, digits, and hyphens only (e.g. \`data-platform\`)."$'\n'
          fi
          if [ -z "$workspace_id" ]; then
            errors+="- Workspace ID is required."$'\n'
          elif ! [[ "$workspace_id" =~ ^[0-9]+$ ]]; then
            errors+="- Workspace ID \`$workspace_id\` is invalid. Must be a numeric Databricks workspace ID."$'\n'
          fi
          [ -z "$sandbox_catalog" ] && errors+="- Sandbox catalog is required."$'\n'
          [ -z "$cost_center" ]     && errors+="- Cost center is required."$'\n'
          [ -z "$data_domain" ]     && errors+="- Data domain is required."$'\n'

          if [ -n "$errors" ]; then
            comment="The request could not be processed:"$'\n\n'"$errors"$'\n'"Please open a new request with corrected values."
            gh issue comment "$ISSUE_NUMBER" -R "$REPO" -b "$comment"
            gh issue close "$ISSUE_NUMBER" -R "$REPO" -r "not planned"
            echo "::error::Validation failed — see issue comment for details"
            exit 1
          fi

          {
            echo "team_name=$team_name"
            echo "workspace_id=$workspace_id"
            echo "sandbox_catalog=$sandbox_catalog"
            echo "cost_center=$cost_center"
            echo "data_domain=$data_domain"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Terraform files
        env:
          TEAM_NAME: ${{ steps.parse.outputs.team_name }}
          WORKSPACE_ID: ${{ steps.parse.outputs.workspace_id }}
          SANDBOX_CATALOG: ${{ steps.parse.outputs.sandbox_catalog }}
          COST_CENTER: ${{ steps.parse.outputs.cost_center }}
          DATA_DOMAIN: ${{ steps.parse.outputs.data_domain }}
        run: |
          mkdir -p "teams/${TEAM_NAME}"
          cat > "teams/${TEAM_NAME}/main.tf" <<EOF
          # Generated by issue #${{ github.event.issue.number }} — do not edit by hand.
          # Edit the issue and re-run the workflow, or open a follow-up PR.

          terraform {
            required_providers {
              databricks = {
                source                = "databricks/databricks"
                configuration_aliases = [databricks.account, databricks.workspace]
                version               = ">= 1.50.0"
              }
            }
          }

          module "team_${TEAM_NAME//-/_}" {
            source = "../../modules/uc_team_provisioning"

            providers = {
              databricks.account   = databricks.account
              databricks.workspace = databricks.workspace
            }

            team_name       = "${TEAM_NAME}"
            workspace_id    = ${WORKSPACE_ID}
            sandbox_catalog = "${SANDBOX_CATALOG}"

            tags = {
              cost_center = "${COST_CENTER}"
              team        = "${TEAM_NAME}"
              data_domain = "${DATA_DOMAIN}"
            }
          }
          EOF

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: new-team/${{ steps.parse.outputs.team_name }}
          base: main
          commit-message: "Add team ${{ steps.parse.outputs.team_name }}"
          title: "Add team `${{ steps.parse.outputs.team_name }}` (issue #${{ github.event.issue.number }})"
          body: |
            Auto-generated from issue #${{ github.event.issue.number }}.

            **Team:** `${{ steps.parse.outputs.team_name }}`
            **Workspace:** `${{ steps.parse.outputs.workspace_id }}`
            **Sandbox catalog:** `${{ steps.parse.outputs.sandbox_catalog }}`
            **Cost center:** `${{ steps.parse.outputs.cost_center }}`
            **Data domain:** `${{ steps.parse.outputs.data_domain }}`

            This PR will be auto-routed to the appropriate CODEOWNER for review.
            Closes #${{ github.event.issue.number }} on merge.
          labels: new-team, auto-generated

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Pull request opened — review and approve to provision this team.'
            })
