name: Access request → PR

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  open-pr:
    if: contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse and validate issue body
        id: parse
        env:
          BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          extract() {
            python3 -c "
          import os, re, sys
          body = os.environ['BODY']
          label = sys.argv[1]
          m = re.search(r'^###\s+' + re.escape(label) + r'\s*\n+(.+?)(?=\n###|\Z)', body, re.M | re.S)
          if not m:
              print('', end='')
              sys.exit(0)
          print(m.group(1).strip())
          " "$1"
          }

          catalog_name=$(extract "Catalog name")
          role=$(extract "Role")
          user_email=$(extract "Your Databricks user email")
          justification=$(extract "Business justification")

          errors=""
          if [ -z "$catalog_name" ]; then
            errors+="- Catalog name is required."$'\n'
          elif ! [[ "$catalog_name" =~ ^[a-z][a-z0-9_]*$ ]]; then
            errors+="- Catalog name \`$catalog_name\` is invalid. Unity Catalog requires lowercase letters, digits, and underscores only (no hyphens, no uppercase)."$'\n'
          fi
          case "$role" in
            gold-readers|readers|engineers|owners) ;;
            "")
              errors+="- Role is required."$'\n'
              ;;
            *)
              errors+="- Role \`$role\` is invalid. Must be one of: gold-readers, readers, engineers, owners."$'\n'
              ;;
          esac
          if [ -z "$user_email" ]; then
            errors+="- User email is required."$'\n'
          elif ! [[ "$user_email" =~ ^[^@[:space:]]+@[^@[:space:]]+\.[^@[:space:]]+$ ]]; then
            errors+="- User email \`$user_email\` does not look like a valid email address."$'\n'
          fi
          [ -z "$justification" ] && errors+="- Business justification is required."$'\n'

          if [ -n "$errors" ]; then
            comment="The access request could not be processed:"$'\n\n'"$errors"$'\n'"Please open a new request with corrected values."
            gh issue comment "$ISSUE_NUMBER" -R "$REPO" -b "$comment"
            gh issue close "$ISSUE_NUMBER" -R "$REPO" -r "not planned"
            echo "::error::Validation failed — see issue comment for details"
            exit 1
          fi

          # Build TF-safe identifiers
          # user "alice.smith@example.com" -> "alice_smith"
          user_local=$(echo "$user_email" | cut -d'@' -f1)
          user_sanitized=$(echo "$user_local" | tr '.+-' '___')
          # role "gold-readers" -> "gold_readers" for TF block resource name
          role_underscore="${role//-/_}"
          # group resource name in catalogs/<catalog>/groups.tf:
          #   gold-readers -> databricks_group.gold_readers
          #   readers      -> databricks_group.readers
          #   engineers    -> databricks_group.engineers
          #   owners       -> databricks_group.owners
          group_resource="$role_underscore"

          {
            echo "catalog_name=$catalog_name"
            echo "role=$role"
            echo "role_underscore=$role_underscore"
            echo "group_resource=$group_resource"
            echo "user_email=$user_email"
            echo "user_sanitized=$user_sanitized"
            echo "justification<<EOD"
            echo "$justification"
            echo "EOD"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Terraform file
        env:
          CATALOG_NAME: ${{ steps.parse.outputs.catalog_name }}
          ROLE: ${{ steps.parse.outputs.role }}
          GROUP_RESOURCE: ${{ steps.parse.outputs.group_resource }}
          USER_EMAIL: ${{ steps.parse.outputs.user_email }}
          USER_SANITIZED: ${{ steps.parse.outputs.user_sanitized }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          mkdir -p "catalogs/${CATALOG_NAME}/access"
          cat > "catalogs/${CATALOG_NAME}/access/${USER_SANITIZED}-${ROLE}.tf" <<EOF
          # Generated by issue #${ISSUE_NUMBER} — granting ${USER_EMAIL} the ${ROLE} role on ${CATALOG_NAME}.
          # To revoke, delete this file and merge.

          data "databricks_user" "${USER_SANITIZED}" {
            user_name = "${USER_EMAIL}"
          }

          resource "databricks_group_member" "${USER_SANITIZED}_${GROUP_RESOURCE}" {
            group_id  = databricks_group.${GROUP_RESOURCE}.id
            member_id = data.databricks_user.${USER_SANITIZED}.id
          }
          EOF

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: access/${{ steps.parse.outputs.catalog_name }}-${{ steps.parse.outputs.user_sanitized }}-${{ steps.parse.outputs.role }}
          base: main
          commit-message: "Grant ${{ steps.parse.outputs.user_email }} ${{ steps.parse.outputs.role }} on ${{ steps.parse.outputs.catalog_name }}"
          title: "Access: ${{ steps.parse.outputs.user_email }} → ${{ steps.parse.outputs.catalog_name }} (`${{ steps.parse.outputs.role }}`) — issue #${{ github.event.issue.number }}"
          body: |
            Auto-generated from issue #${{ github.event.issue.number }}.

            **User:** ${{ steps.parse.outputs.user_email }}
            **Catalog:** `${{ steps.parse.outputs.catalog_name }}`
            **Role:** `${{ steps.parse.outputs.role }}`

            **Business justification (from requester):**
            > ${{ steps.parse.outputs.justification }}

            ---

            This PR will be auto-routed to the catalog's data owner via CODEOWNERS for review.

            **Note:** this PR assumes `catalogs/${{ steps.parse.outputs.catalog_name }}/groups.tf` already exists
            (i.e., the catalog has been provisioned via the "New project catalog request" flow). If the catalog
            doesn't exist yet, request the catalog first.

            Closes #${{ github.event.issue.number }} on merge.
          labels: access-request, auto-generated

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Pull request opened — the data owner of this catalog will review and approve.'
            })
